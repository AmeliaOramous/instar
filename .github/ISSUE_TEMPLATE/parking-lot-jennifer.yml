name: Parking Lot (Jennifer)
description: Capture a new idea for Jennifer's parking lot
labels: ["parking-lot", "owner:jennifer"]
title: "[PL][Jennifer] <short title>"
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences capturing the idea
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation / Why now
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: [P1, P2, P3]
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes / Links
