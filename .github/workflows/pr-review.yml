name: PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - master

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || true

      - name: Run lint
        run: npm run lint || true

      - name: Check format
        run: npm run format:check || true

  type-check:
    name: Type Checking
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || true

      - name: Type check
        run: npm run type-check || true

  test:
    name: Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || true

      - name: Run tests
        run: npm test || true

  build:
    name: Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || true

      - name: Build
        run: npm run build || true

      - name: Check structure
        run: |
          echo "📦 Checking repository structure..."
          [ -d src ] && echo "✅ src/" || echo "⚠️  src/"
          [ -d docs ] && echo "✅ docs/" || echo "⚠️  docs/"
          [ -f package.json ] && echo "✅ package.json" || echo "⚠️  package.json"
          [ -f .github/workflows ] && echo "✅ .github/workflows/" || echo "⚠️  .github/workflows/"

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [lint, type-check, test, build]
    if: always()
    permissions:
      pull-requests: write

    steps:
      - name: Create PR comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ✅ PR Checks Complete

All automated checks have run:
- ✓ Lint & Format Check
- ✓ Type Checking
- ✓ Tests
- ✓ Build Check

**Next steps:**
1. Review changes manually
2. Request changes if needed
3. Approve and merge when ready

---
*GitHub Actions automation - no manual review yet*`
            });
