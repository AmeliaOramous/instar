name: PR Assistant
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
permissions:
  contents: read
  pull-requests: write
jobs:
  summarize:
    # Run only for internal PRs so secrets stay safe
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const files = await github.paginate(github.rest.pulls.listFiles, { owner, repo, pull_number: pr.number, per_page: 100 });
            let text = "Title: " + pr.title + "\n\n";
            if (pr.body) text += "Body:\n" + pr.body + "\n\n";
            text += "Changed files:\n";
            for (const f of files.slice(0, 50)) {
              text += "- " + f.filename + " (+" + f.additions + "/-" + f.deletions + ")\n";
            }
            const prompt = "Summarize this pull request for maintainers.\n" + text + "\nReturn:\n- Overview (1-2 sentences)\n- Key changes (bullets)\n- Risk areas / migration notes\n- Suggested reviewers if obvious";
            const res = await fetch("https://api.openai.com/v1/chat/completions", {
              method: "POST",
              headers: { "Content-Type": "application/json", "Authorization": "Bearer " + process.env.OPENAI_API_KEY },
              body: JSON.stringify({
                model: process.env.OPENAI_MODEL || "gpt-4o-mini",
                messages: [
                  { role: "system", content: "You are a concise senior engineer reviewing pull requests." },
                  { role: "user", content: prompt }
                ],
                temperature: 0.2
              })
            });
            if (!res.ok) {
              const t = await res.text();
              throw new Error("OpenAI error " + res.status + ": " + t);
            }
            const data = await res.json();
            const summary = (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) || "(no summary)";
            const body = "PR Assistant (model: " + (process.env.OPENAI_MODEL || "gpt-4o-mini") + ")\n\n" + summary;
            await github.rest.issues.createComment({ owner, repo, issue_number: pr.number, body });