name: Upstream Sync
on:
  schedule:
    - cron: '23 6 * * *'  # daily 06:23 UTC
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configure git
        run: |
          git config user.name briar-bot
          git config user.email briar-bot@users.noreply.github.com
      - name: Add upstream and fetch
        run: |
          git remote add upstream https://github.com/JKHeadley/instar.git || true
          git fetch upstream --prune
      - name: Fast-forward main from upstream
        run: |
          set -e
          git checkout main
          git merge --ff-only upstream/main
          git push origin main
      - name: Open issue on conflict
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = Upstream
